<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Noto+Sans+JP:wght@400;600&family=Caveat&family=Playfair+Display&family=Noto+Serif+JP&display=swap');
:root{--b0:#060a14;--b1:#0c1220;--b2:#121a2e;--b3:#1a2440;--b4:#223050;--tx:#d8e0f0;--t2:#7888a8;--t3:#4a5878;--ac:#3d8bfd;--a2:#fcd34d;--a3:#8b5cf6;--bd:rgba(60,90,140,.25);--r:6px;--M:'JetBrains Mono',monospace;--S:'Noto Sans JP',system-ui,sans-serif}
*{margin:0;padding:0;box-sizing:border-box}body{background:var(--b0);color:var(--tx);font-family:var(--S);overflow:hidden;height:100dvh;font-size:13px}
::selection{background:var(--ac);color:#fff}
input[type=range]{-webkit-appearance:none;appearance:none;height:4px;background:var(--b3);border-radius:2px;outline:none;cursor:pointer}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:var(--ac);border:2px solid var(--b0);cursor:pointer}
input[type=number]{width:40px;background:var(--b3);border:1px solid var(--bd);color:var(--tx);border-radius:3px;padding:2px;font-size:10px;font-family:var(--M);text-align:center;outline:none}
input[type=number]:focus{border-color:var(--ac)}
textarea{background:var(--b3);border:1px solid var(--bd);color:var(--tx);border-radius:3px;padding:4px 6px;font-size:14px;outline:none;width:100px;height:38px;resize:vertical;font-family:var(--S)}
textarea:focus{border-color:var(--ac)}
select{background:var(--b3);border:1px solid var(--bd);color:var(--tx);border-radius:3px;padding:2px 4px;font-size:10px;font-family:var(--S);outline:none;cursor:pointer}
#app{display:grid;grid-template-rows:auto auto 1fr auto;height:100dvh}
#hd{background:linear-gradient(180deg,var(--b1),var(--b2));display:flex;align-items:center;padding:0 12px;height:40px;gap:6px;border-bottom:1px solid var(--bd)}
#hd h1{font-family:var(--M);font-size:14px;font-weight:600;letter-spacing:1.5px;margin-right:auto;cursor:pointer;color:var(--ac)}
#hd h1 i{font-style:normal;color:var(--a3);font-size:11px}
.hb{background:var(--b3);border:1px solid var(--bd);color:var(--t2);padding:3px 9px;border-radius:var(--r);font-size:10px;cursor:pointer;font-family:var(--M);transition:all .15s}
.hb:hover{border-color:var(--ac);color:var(--tx)}
.hs{width:1px;height:16px;background:var(--bd)}
#ctrl{background:var(--b1);border-bottom:1px solid var(--bd);padding:6px 12px 4px;overflow-x:auto;scrollbar-width:none}
#ctrl::-webkit-scrollbar{display:none}
.tabs{display:inline-flex;background:var(--b3);border-radius:var(--r);padding:2px;margin-bottom:5px;border:1px solid var(--bd)}
.tab{padding:4px 12px;border-radius:4px;cursor:pointer;font-size:11px;color:var(--t2);border:none;background:transparent;font-family:var(--S);transition:all .15s}
.tab.on{background:var(--ac);color:#fff;font-weight:600}
.sect{display:none}.sect.vis{display:flex;flex-wrap:wrap;gap:5px;align-items:center;margin-bottom:4px}
.cr{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:4px}
.cr>label{font-size:11px;color:var(--t2);display:flex;align-items:center;gap:4px}
.cr input[type=range]{width:55px}
.ht{width:14px;height:14px;border-radius:50%;background:var(--b4);border:1px solid var(--bd);color:var(--t3);font-size:8px;cursor:help;display:inline-flex;align-items:center;justify-content:center;font-weight:600;flex-shrink:0;position:relative;font-family:var(--M)}
.ht:hover{border-color:var(--a3);color:var(--a3)}
.ht:hover::after{content:attr(data-h);position:absolute;top:calc(100% + 5px);left:50%;transform:translateX(-50%);background:var(--b4);border:1px solid var(--bd);padding:6px 8px;border-radius:var(--r);font-size:10px;white-space:pre-wrap;z-index:999;color:var(--tx);pointer-events:none;line-height:1.4;max-width:200px;font-family:var(--S);box-shadow:0 4px 16px rgba(0,0,0,.4)}
.sb{font-size:10px;padding:3px 8px;border-radius:var(--r);cursor:pointer;border:1px solid var(--bd);background:var(--b3);color:var(--t2);font-family:var(--S);transition:all .15s}
.sb:hover{border-color:var(--ac);color:var(--tx)}.sb.on{background:var(--ac);color:#fff;border-color:var(--ac)}
.sb.ac{border-color:var(--a3);color:var(--a3)}.sb.ac.on{background:var(--a3);color:#fff}
.sb.dn{border-color:#e53e3e;color:#fc8181}.sb.dn:hover{background:rgba(229,62,62,.12)}
.sb:disabled{opacity:.3;cursor:default;pointer-events:none}
.tpl{display:flex;gap:3px;flex-wrap:wrap}
.tpl button{font-size:10px;padding:4px 9px;border-radius:var(--r);cursor:pointer;border:1px solid var(--bd);background:var(--b3);color:var(--t2);font-family:var(--S);transition:all .15s}
.tpl button:hover{border-color:var(--a2);color:var(--a2)}
.ci{width:18px;height:18px;border:1px solid var(--bd);border-radius:3px;padding:0;cursor:pointer;-webkit-appearance:none;appearance:none;background:none}
.ci::-webkit-color-swatch-wrapper{padding:1px}.ci::-webkit-color-swatch{border:none;border-radius:2px}
#cw{position:relative;overflow:hidden;background:var(--b0);touch-action:none}
#cv{width:100%;height:100%;display:block;cursor:crosshair}
#ov{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;pointer-events:none;transition:opacity .5s}
#ov.h{opacity:0}#ov p{font-size:16px;color:var(--t2);margin:0 0 4px;font-weight:600}#ov small{font-size:11px;color:var(--t3)}
#ov .math{font-family:var(--M);font-size:10px;color:var(--t3);margin-top:10px;opacity:.4}
#ft{background:var(--b1);display:flex;align-items:center;justify-content:space-between;padding:0 12px;height:32px;border-top:1px solid var(--bd);overflow-x:auto;scrollbar-width:none}
#ft::-webkit-scrollbar{display:none}.st{font-family:var(--M);font-size:10px;color:var(--t3)}.fa{display:flex;gap:3px;flex-shrink:0}
#edu{display:none;background:var(--b2);border-top:1px solid var(--bd);padding:14px 18px;overflow-y:auto;max-height:200px;font-size:12px;line-height:1.7;color:var(--t2)}
#edu.vis{display:block}#edu h4{font-size:13px;font-weight:600;color:var(--ac);margin:12px 0 3px}#edu h4:first-child{margin-top:0}
.fm{font-family:var(--M);font-size:11px;padding:6px 10px;background:var(--b3);border-radius:var(--r);border:1px solid var(--bd);margin:4px 0;display:inline-block;color:var(--a2)}
.eg{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin:8px 0}
.ec{padding:8px;background:var(--b3);border-radius:var(--r);border:1px solid var(--bd)}.ec b{font-weight:600;font-size:11px;color:var(--a3);display:block;margin-bottom:2px}.ec span{font-size:11px}
input[type=file]{display:none}
.mbg{display:none;position:fixed;inset:0;background:rgba(4,8,16,.85);z-index:9999;align-items:center;justify-content:center;backdrop-filter:blur(4px)}.mbg.on{display:flex}
.mod{background:var(--b2);border:1px solid var(--bd);border-radius:12px;padding:24px;max-width:380px;width:92%;position:relative;box-shadow:0 16px 48px rgba(0,0,0,.5)}
.mc{position:absolute;top:8px;right:12px;background:none;border:none;color:var(--t3);font-size:16px;cursor:pointer}.mc:hover{color:var(--tx)}
.bmc{display:flex;align-items:center;justify-content:center;gap:8px;background:#FFDD00;color:#000;padding:9px;border-radius:8px;text-decoration:none;font-weight:700;font-size:12px;margin:12px 0}
.cbox{background:var(--b3);border:1px solid var(--bd);border-radius:var(--r);padding:8px;margin-top:12px}.cbox .cl{font-family:var(--M);font-size:8px;color:var(--t3);margin-bottom:3px;letter-spacing:1.5px}.cbox p{font-size:10px;color:var(--t2);line-height:1.5}.cbox a{color:var(--ac);text-decoration:none}
.expg{display:flex;flex-direction:column;gap:6px}.expg button{padding:10px;font-size:12px;width:100%}
#recInd{display:none;position:absolute;top:10px;right:10px;background:rgba(200,30,30,.9);color:#fff;padding:4px 10px;border-radius:20px;font-size:10px;font-family:var(--M);z-index:10;animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}


.hb, .sb { padding: 6px 10px; font-size: 11px; white-space: nowrap; flex-shrink: 0; }
.tab { padding: 6px 12px; font-size: 12px; white-space: nowrap; flex-shrink: 0; }
.tpl button { padding: 6px 10px; font-size: 11px; white-space: nowrap; }
.ht { width: 18px; height: 18px; font-size: 10px; }
.hs { flex-shrink: 0; }

input[type=range] { height: 6px; }
input[type=range]::-webkit-slider-thumb { width: 18px; height: 18px; }
input[type=number] { width: 56px; padding: 4px; font-size: 11px; }
select { padding: 4px 6px; font-size: 11px; }
.ci { width: 22px; height: 22px; flex-shrink: 0; }
textarea { font-size: 14px; height: 40px; }

#ctrl { max-height: 40dvh; overflow-y: auto; padding: 6px 8px 4px; }
#ctrl::-webkit-scrollbar { width: 4px; }
#ctrl::-webkit-scrollbar-thumb { background: var(--bd); border-radius: 2px; }

.cr { flex-wrap: wrap; gap: 4px; margin-bottom: 6px; }
.cr>label { font-size: 11px; white-space: nowrap; }
.tpl { flex-wrap: wrap; gap: 4px; }

#hd { height: 44px; overflow-x: auto; flex-wrap: nowrap; -webkit-overflow-scrolling: touch; padding: 0 8px; gap: 4px;}
#hd::-webkit-scrollbar { display: none; }
#hd h1 { font-size: 15px; margin-right: auto; flex-shrink: 0; }

.ht::after,
.ht::before,
.tooltip {
    white-space: pre-wrap !important;
    word-break: normal !important;
    width: max-content !important;
    max-width: 250px;
    line-height: 1.4;
}
  
</style>
<script>
  window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
</script>
<script defer src="/_vercel/insights/script.js"></script>
</head>
<body>
    <div id="app">
        <div id="hd">
            <h1 onclick="$('abtM').classList.add('on')">&#9674; FouriTre <i
                    id="hdSub">&#12501;&#12540;&#12522;&#12488;&#12524;</i></h1>
            <button class="hb" id="langBtn" onclick="tgLang()">EN</button>
            <div class="hs"></div>
            <button class="sb" id="b-undo" onclick="undo()" disabled></button>
            <button class="sb" id="b-redo" onclick="redo()" disabled></button>
            <button class="sb" id="b-copy" onclick="copyObj()"></button>
            <button class="sb" id="b-paste" onclick="pasteObj()"></button>
            <canvas id="clipPrev" width="30" height="30"
                style="background:var(--b3); border:1px solid var(--bd); border-radius:4px; vertical-align:middle; margin-left:4px;"></canvas>
            <div class="hs"></div>
            <button class="sb ac" id="b-move" onclick="tgMove()">&#9995;</button>
            <div class="hs"></div>
            <button class="hb" id="dlBtn" onclick="$('expM').classList.add('on')"></button>
            <button class="hb" id="aboutBtn" onclick="$('abtM').classList.add('on')"></button>
        </div>
        <div id="ctrl">
            <div class="tabs"><button class="tab on" data-m="draw" id="tabDraw"></button><button class="tab"
                    data-m="import" id="tabImport"></button><button class="tab" data-m="text"
                    id="tabText"></button><button class="tab" data-m="templ" id="tabTempl"></button></div>
            <div id="s-draw" class="sect vis">
                <div class="cr">
                    <label id="lStab"></label><input type="range" id="r-wt" min="1" max="20" value="6"><input
                        type="number" id="n-wt" min="1" max="20" value="6"><span class="ht" id="hStab">?</span>
                    <label id="lSmooth"></label><input type="range" id="r-sm" min="0" max="15" value="3"><input
                        type="number" id="n-sm" min="0" max="15" value="3"><span class="ht" id="hSmooth">?</span>
                </div>
            </div>
            <div id="s-import" class="sect">
                <div class="cr">
                    <button class="sb" id="b-img"></button><input type="file" id="f-img" accept="image/*"
                        onclick="this.value=null">
                    <label id="lThresh"></label><input type="range" id="r-th" min="5" max="500" value="250"><input
                        type="number" id="n-th" min="5" max="500" value="250"><span class="ht" id="hThresh">?</span>
                    <label id="lContN"></label><input type="range" id="r-cn" min="1" max="1000" value="100"><input
                        type="number" id="n-cn" min="1" max="1000" value="100"><span class="ht" id="hContN">?</span>
                    <button class="sb" id="b-redet" style="display:none"></button>
                    <button class="sb" id="b-mono" onclick="tgMono()"></button>
                </div>
            </div>
            <div id="s-text" class="sect">
                <div class="cr">
                    <label id="lTxtIn"></label><textarea id="txtIn" rows="2">&#960;</textarea>
                    <label id="lFont"></label><select id="selFont">
                        <option value="serif">Serif</option>
                        <option value="sans-serif">Sans</option>
                        <option value="'Noto Sans JP'">Noto Sans JP</option>
                        <option value="'Noto Serif JP'">Noto Serif JP</option>
                        <option value="'Playfair Display'">Playfair</option>
                        <option value="'Caveat'">Caveat</option>
                        <option value="monospace">Mono</option>
                    </select>
                    <button class="sb" id="b-loadFont" onclick="$('f-font').click()"></button><input type="file"
                        id="f-font" accept=".ttf,.otf,.woff,.woff2">
                    <label id="lTxtSz"></label><input type="range" id="r-tsz" min="5" max="300" value="160"
                        style="width:50px"><input type="number" id="n-tsz" min="5" max="300" value="160">
                    <label id="lTxtTh"></label><input type="range" id="r-tth" min="5" max="200" value="60"
                        style="width:40px"><input type="number" id="n-tth" min="5" max="200" value="60">
                    <label id="lTxtCn"></label><input type="range" id="r-tcn" min="1" max="200" value="1"
                        style="width:35px"><input type="number" id="n-tcn" min="1" max="200" value="1">
                    <button class="sb" id="b-txtGo" onclick="textToEpi()"></button><span class="ht" id="hText">?</span>
                </div>
            </div>
            <div id="s-templ" class="sect">
                <div class="tpl">
                    <button data-t="star" id="t-star"></button><button data-t="heart" id="t-heart"></button><button
                        data-t="infinity" id="t-inf"></button><button data-t="pi" id="t-pi"></button><button
                        data-t="butterfly" id="t-but"></button><button data-t="wave" id="t-wave"></button><button
                        data-t="cat" id="t-cat"></button><button data-t="spiral" id="t-spi"></button><button
                        data-t="dna" id="t-dna"></button><button data-t="fourier" id="t-four"></button>
                </div>
            </div>
            <div class="cr">
                <label id="lCircles"></label><input type="range" id="r-nc" min="1" max="2000" value="400"><input
                    type="number" id="n-nc" min="1" max="2000" value="400"><span class="ht" id="hCircles">?</span>
                <label id="lLineW"></label><input type="range" id="r-lw" min="0.5" max="16" value="2" step="0.5"><input
                    type="number" id="n-lw" min="0.5" max="16" value="2" step="0.5">
            </div>
            <div class="cr">
                <label id="lTrace"></label><input type="color" class="ci" id="c-tr" value="#fcd34d">
                <label id="lCirCol"></label><input type="color" class="ci" id="c-ci" value="#3d8bfd">
                <label id="lBGCol"></label><input type="color" class="ci" id="c-bg" value="#060a14">
                <label id="lGrid"></label><input type="color" class="ci" id="c-gr" value="#1a3060">
                <select id="s-bg">
                    <option value="grid" id="bg-grid"></option>
                    <option value="dot" id="bg-dot"></option>
                    <option value="none" id="bg-none"></option>
                </select>
                <input type="range" id="r-gs" min="15" max="100" value="40" style="width:35px">
                <div class="hs" style="height:14px"></div>
                <button class="sb ac" id="b-rainbow" onclick="tgF('rainbow')"></button>
                <button class="sb ac" id="b-persist" onclick="tgF('persist')"></button>
                <button class="sb ac" id="b-reveal" onclick="startReveal()"></button>
                <button class="sb ac" id="b-mirror" onclick="tgF('mirror')"></button>
                <button class="sb ac" id="b-sparkle" onclick="tgF('sparkle')"></button>
                <button class="sb ac" id="b-sync" onclick="tgF('sync')"></button>
                <label id="lDrawTime"></label>
                <input type="range" id="r-dt" min="0.5" max="60" value="5" step="0.5">
                <input type="number" id="n-dt" min="0.5" max="60" value="5" step="0.5">
                <span class="ht" id="hDrawTime">?</span>
                <label id="lMirAx" style="display:none"></label><input type="range" id="r-ma" min="0" max="360"
                    value="90" style="width:40px;display:none"><input type="number" id="n-ma" min="0" max="360"
                    value="90" style="display:none">
                <label id="lMirPos" style="display:none"></label><input type="range" id="r-mp" min="0" max="100"
                    value="50" style="width:40px;display:none"><input type="number" id="n-mp" min="0" max="100"
                    value="50" style="display:none">
                <button class="sb" id="b-maxs" style="display:none" onclick="tgF('maxs')"></button>
                <div style="flex:1"></div>
                <button class="sb dn" id="b-del" onclick="tgDel()"></button>
                <button class="sb dn" id="b-clrAll" onclick="clrAll()"></button>
            </div>
        </div>
        <div id="cw"><canvas id="cv"></canvas>
            <div id="ov">
                <p id="ovT"></p><small id="ovS"></small>
                <div class="math">f(t)=&#931;c&#8345;e<sup>in&#969;t</sup></div>
            </div>
            <div id="recInd">&#9679; REC</div>
        </div>
        <div id="ft"><span class="st" id="ep-st"></span>
            <div class="fa">
                <button class="sb" id="b-edu" onclick="tgEdu()"></button>
                <button class="sb" id="b-save" onclick="$('expM').classList.add('on')"></button>
                <button class="sb" id="b-load" onclick="$('f-proj').click()"></button><input type="file" id="f-proj"
                    accept=".json">
                <button class="sb" id="b-auto" onclick="autoGen()"></button>

            </div>
        </div>
        <div id="edu">
            <h4 id="eduT1"></h4>
            <p id="eduP1"></p>
            <h4 id="eduT2"></h4>
            <p id="eduP2"></p>
            <div class="fm">X[k]=(1/N)&middot;&#931;x[n]&middot;e<sup>-i2&pi;kn/N</sup></div>
            <p id="eduP3"></p>
            <div class="eg">
                <div class="ec"><b id="ec1t"></b><span id="ec1d"></span></div>
                <div class="ec"><b id="ec2t"></b><span id="ec2d"></span></div>
                <div class="ec"><b id="ec3t"></b><span id="ec3d"></span></div>
                <div class="ec"><b id="ec4t"></b><span id="ec4d"></span></div>
            </div>
            <p id="eduP4"></p>
        </div>
    </div>
    <div class="mbg" id="abtM">
        <div class="mod" style="max-width:340px">
            <button class="mc" onclick="this.closest('.mbg').classList.remove('on')">&#10005;</button>
            <h2 style="font-family:var(--M);font-size:15px;color:var(--tx);margin-bottom:4px"><span
                    style="color:var(--ac)">&#9674;</span> FouriTre <span id="abtSub"
                    style="font-size:11px;color:var(--a3)">&#12501;&#12540;&#12522;&#12488;&#12524;</span></h2>
            <p id="abtDesc" style="font-size:11px;color:var(--t2)"></p>
            <p style="font-size:10px;color:var(--t3);margin-top:4px">&copy; Ike mfr</p>
            <a href="https://buymeacoffee.com/ike_mfr" target="_blank" class="bmc"><span
                    style="font-size:16px">&#9749;</span> Buy Me a Coffee</a>
            <div class="cbox">
                <div class="cl">CREDITS</div>
                <p>Vanilla JS / Google Fonts / <a href="https://www.youtube.com/watch?v=r6sGWTCMz2k"
                        target="_blank">3Blue1Brown</a></p>
            </div>
        </div>
    </div>
    <div class="mbg" id="expM">
        <div class="mod" style="max-width:340px">
            <button class="mc" onclick="this.closest('.mbg').classList.remove('on')">&#10005;</button>
            <h2 style="color:var(--tx);font-size:14px;margin-bottom:10px" id="expTitle"></h2>

            <div style="margin-bottom:12px;">
                <label id="lExpName" style="font-size:10px; color:var(--t3); display:block; margin-bottom:4px;"></label>
                <input type="text" id="expFileName" placeholder="fouritre"
                    style="width:100%; background:var(--b3); border:1px solid var(--bd); color:var(--tx); padding:8px; border-radius:var(--r); outline:none; font-family:var(--M);">
            </div>

            <div class="expg">
                <button class="sb" onclick="expAs('png')">PNG</button><button class="sb" onclick="expAs('png-t')"
                    id="expPngT"></button>
                <button class="sb" onclick="expAs('jpeg')">JPEG</button><button class="sb" onclick="expAs('webm')"
                    id="expWebm"></button>
                <button class="sb" onclick="expAs('gif')" id="expGif"></button>
                <button class="sb" onclick="savePrjFile()" id="expJson"></button>
            </div>
        </div>
    </div>

        function expAs(fmt) {
            var fn = $('expFileName').value.trim() || 'fouritre';
            $('expM').classList.remove('on');

            // Static image export (PNG, JPEG, transparent PNG)
            if (fmt === 'png' || fmt === 'png-t' || fmt === 'jpeg') {
                var tc = document.createElement('canvas');
                tc.width = W * dp;
                tc.height = H * dp;
                var tcx = tc.getContext('2d');
                if (fmt !== 'png-t') {
                    tcx.fillStyle = cBg;
                    tcx.fillRect(0, 0, tc.width, tc.height);
                }
                tcx.drawImage(cv, 0, 0);
                if (fmt === 'png-t') {
                    var imgD = tcx.getImageData(0, 0, tc.width, tc.height);
                    var dd = imgD.data;
                    var bg = hR(cBg);
                    for (var i = 0; i < dd.length; i += 4) {
                        if (Math.abs(dd[i] - bg[0]) < 25 && Math.abs(dd[i + 1] - bg[1]) < 25 && Math.abs(dd[i + 2] - bg[2]) < 25)
                            dd[i + 3] = 0;
                    }
                    tcx.putImageData(imgD, 0, 0);
                }
                tc.toBlob(function (blob) {
                    var a = document.createElement('a');
                    a.href = URL.createObjectURL(blob);
                    // Apply file name
                    a.download = fn + '.' + (fmt === 'jpeg' ? 'jpg' : 'png');
                    a.click();
                }, fmt === 'jpeg' ? 'image/jpeg' : 'image/png', .95);
                return;
            }

            // WebM video export
            if (fmt === 'webm') {
                $('recInd').style.display = 'block';
                layers.forEach(function (ly) {
                    ly.cons.forEach(function (c) { c.tp = []; c.tm = 0; c.done = false });
                    ly.frozen = [];
                });
                try {
                    var stream = cv.captureStream(30);
                    var rec = new MediaRecorder(stream, { mimeType: 'video/webm' });
                    var chunks = [];
                    rec.ondataavailable = function (e) { if (e.data.size > 0) chunks.push(e.data) };
                    rec.onstop = function () {
                        $('recInd').style.display = 'none';
                        var blob = new Blob(chunks, { type: 'video/webm' });
                        var a = document.createElement('a');
                        a.href = URL.createObjectURL(blob);
                        // Apply file name
                        a.download = fn + '.webm';
                        a.click();
                    };
                    rec.start();
                    setTimeout(function () { rec.stop() }, drawDuration * 1000 + 500);
                } catch (e) {
                    $('recInd').style.display = 'none';
                    alert('WebM not supported');
                }
            }

            // GIF export (actually WebM or static image fallback)
            if (fmt === 'gif') {
                $('recInd').style.display = 'block';
                layers.forEach(function (ly) {
                    ly.cons.forEach(function (c) { c.tp = []; c.tm = 0; c.done = false });
                    ly.frozen = [];
                });
                var gifFrames = [];
                var gifFps = 20;
                var gifTotalFrames = Math.round(drawDuration * gifFps);
                var gifFrame = 0;

                function captureGifFrame() {
                    if (gifFrame >= gifTotalFrames) {
                        $('recInd').style.display = 'none';
                        cv.toBlob(function (blob) {
                            var a = document.createElement('a');
                            a.href = URL.createObjectURL(blob);
                            // Apply file name to fallback PNG
                            a.download = fn + '.png';
                            a.click();
                        }, 'image/png');
                        return;
                    }
                    gifFrame++;
                    setTimeout(captureGifFrame, 1000 / gifFps);
                }

                try {
                    var stream = cv.captureStream(gifFps);
                    var rec = new MediaRecorder(stream, { mimeType: 'video/webm' });
                    var chunks = [];
                    rec.ondataavailable = function (e) { if (e.data.size > 0) chunks.push(e.data) };
                    rec.onstop = function () {
                        $('recInd').style.display = 'none';
                        var blob = new Blob(chunks, { type: 'video/webm' });
                        var a = document.createElement('a');
                        a.href = URL.createObjectURL(blob);
                        // Apply file name to animated WebM
                        a.download = fn + '-anim.webm';
                        a.click();
                    };
                    rec.start();
                    setTimeout(function () { rec.stop() }, drawDuration * 1000 + 500);
                } catch (e) {
                    $('recInd').style.display = 'none';
                    captureGifFrame(); // Fallback for when WebM is not supported
                }
            }
        }

        function updateClipPreview() {
            var cpv = $('clipPrev');
            var ctx = cpv.getContext('2d');
            ctx.clearRect(0, 0, 30, 30);
            if (!clipboard) return;

            var cData = JSON.parse(clipboard);
            ctx.lineWidth = 1.5;
            ctx.lineCap = 'round';

            var minX = 1e9, maxX = -1e9, minY = 1e9, maxY = -1e9;
            cData.forEach(function (c) {
                c.pts.forEach(function (p) {
                    if (p.x < minX) minX = p.x; if (p.x > maxX) maxX = p.x;
                    if (p.y < minY) minY = p.y; if (p.y > maxY) maxY = p.y;
                });
            });

            var sw = maxX - minX, sh = maxY - minY;
            var sc = 22 / Math.max(sw, sh, 1);
            var ox = (minX + maxX) / 2, oy = (minY + maxY) / 2;

            cData.forEach(function (c) {

                var pts = c.pts;
                if (pts.length < 2) return;

                ctx.beginPath();
                ctx.moveTo(15 + (pts[0].x - ox) * sc, 15 + (pts[0].y - oy) * sc);
                for (var i = 1; i < pts.length; i++) {
                    ctx.lineTo(15 + (pts[i].x - ox) * sc, 15 + (pts[i].y - oy) * sc);
                }
                ctx.stroke();
            });
        }
